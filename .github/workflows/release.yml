name: release

# On a pushed `v*` tag: build an abi3 wheel per OS (one wheel covers
# CPython 3.8 -> 3.13) plus an sdist, then publish them all to a GitHub
# Release whose body is the matching CHANGELOG section.
#
# Action SHAs are pinned to match the rest of the repo's workflows.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.3.12)"
        required: true

permissions:
  contents: read

jobs:
  wheels:
    name: wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest builds a universal2 wheel (arm64 + x86_64) so a single
        # macOS job covers both Apple Silicon and Intel — no flaky macos-13
        # Intel runner needed.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Python (build host)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Build wheel (maturin, abi3)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.os == 'macos-latest' && 'universal2-apple-darwin' || '' }}
          args: --release --out dist --interpreter 3.11
          sccache: "true"
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || '' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build sdist (maturin)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: dist
          merge-multiple: true

      - name: Extract CHANGELOG section for this tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "TAG=$tag" >> "$GITHUB_ENV"
          awk -v hdr="## [$version]" '
            index($0, hdr)==1 {grab=1; next}
            grab && index($0,"## [")==1 {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${tag} of rubam." > release-notes.md
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create / update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=$(find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \))
          echo "assets:"; echo "$assets"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" $assets --clobber
          else
            gh release create "${TAG}" $assets \
              --title "rubam ${TAG}" \
              --notes-file release-notes.md
          fi
