name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Python 3.8 is not in setup-python's hosted-tool cache for arm64 macOS.
          - os: macos-latest
            python-version: "3.8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Create virtualenv
        # `maturin develop` requires an active virtualenv. Create one and put
        # it on PATH + VIRTUAL_ENV for every subsequent step (each step is a
        # fresh shell, so activation must go through GITHUB_PATH/GITHUB_ENV).
        shell: bash
        run: |
          python -m venv .venv
          if [ -d .venv/Scripts ]; then
            echo "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # numpy is needed by the get_depths_numpy return path exercised in
          # the test suite.
          python -m pip install maturin pytest numpy

      - name: Build native extension
        shell: bash
        run: maturin develop --release

      - name: Build standalone CLI binaries
        # Built with --no-default-features so they do NOT link pyo3 / the
        # Python runtime (no python3.dll dependency on Windows). The CLI
        # tests (test_cli_samtools.py) locate them under target/release.
        shell: bash
        run: cargo build --release --bins --no-default-features

      - name: Verify CLI
        shell: bash
        run: rubam --help

      - name: Run pytest
        shell: bash
        run: python -m pytest -v

      - name: Run cargo test
        shell: bash
        # --no-default-features tests the pure-Rust `api` surface without the
        # pyo3 `extension-module` feature, which otherwise leaves libpython
        # symbols undefined when linking a standalone test executable on
        # Linux/macOS. The Python bindings are covered by pytest above.
        run: cargo test --release --no-default-features

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |
          set -o pipefail
          # RUSTSEC-2025-0020 affects pyo3 < 0.24.1's PyString::from_object,
          # which rubam does not call. Tracked for a future pyo3 bump.
          cargo audit --ignore RUSTSEC-2025-0020 --json | tee cargo-audit.json
      - name: Upload audit report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cargo-audit-report
          path: cargo-audit.json
