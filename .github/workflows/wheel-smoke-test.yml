name: Wheel smoke test

# Build a wheel per OS, then in a *separate* job install the wheel in a
# clean virtualenv (with the source tree *not* on PYTHONPATH) and run
# `python -m rubam.smoke_test`. This proves that the published artifact
# itself is functional, independent of the source checkout.
#
# We rely on pyo3 abi3-py38: a single wheel per OS covers all of Python
# 3.8 -> 3.13, so the matrix is OS-only.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Python (build host)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Build wheel (maturin, abi3)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          # macos-latest builds a universal2 wheel (arm64 + x86_64); Linux
          # runs inside manylinux for portable wheels; others build natively.
          target: ${{ matrix.os == 'macos-latest' && 'universal2-apple-darwin' || '' }}
          args: --release --out dist --interpreter 3.11
          sccache: "true"
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || '' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: smoke / ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      # We deliberately do NOT check out the source tree on POSIX so the
      # rubam package can only come from the installed wheel. On Windows
      # we still avoid putting the repo on sys.path by running the test
      # from a scratch directory below.
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Download wheel artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: wheel-${{ matrix.os }}
          path: wheelhouse

      - name: Create clean venv and install wheel (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/smoke"
          cd "$RUNNER_TEMP/smoke"
          python -m venv .venv
          # shellcheck disable=SC1091
          . .venv/bin/activate
          python -m pip install --upgrade pip
          # Glob: exactly one wheel per OS thanks to abi3.
          wheel_file=$(ls "$GITHUB_WORKSPACE"/wheelhouse/*.whl | head -n1)
          echo "installing $wheel_file"
          python -m pip install "$wheel_file"
          python -c "import rubam, sys; print('rubam', rubam.__version__, 'from', rubam.__file__)"

      - name: Run smoke test (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/smoke"
          # shellcheck disable=SC1091
          . .venv/bin/activate
          # cd to /tmp so the (absent) source tree is unreachable;
          # also wipe PYTHONPATH for paranoia.
          cd /tmp
          PYTHONPATH="" python -m rubam.smoke_test

      - name: Create clean venv and install wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP 'smoke'
          New-Item -ItemType Directory -Force -Path $smoke | Out-Null
          Set-Location $smoke
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          $wheel = (Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'wheelhouse') -Filter '*.whl' | Select-Object -First 1).FullName
          Write-Host "installing $wheel"
          .\.venv\Scripts\python.exe -m pip install $wheel
          .\.venv\Scripts\python.exe -c "import rubam, sys; print('rubam', rubam.__version__, 'from', rubam.__file__)"

      - name: Run smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHONPATH: ""
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP 'smoke'
          $py = Join-Path $smoke '.venv\Scripts\python.exe'
          # cd somewhere that is NOT the repo root so a stray rubam/
          # directory on the workspace can't shadow the installed wheel.
          Set-Location $env:TEMP
          & $py -m rubam.smoke_test
